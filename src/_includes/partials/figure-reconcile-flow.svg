{#- In-article diagram-feature — book balance → adjustments → bank, reconciled.
    Captured verbatim from the locked Guide template (Guide - Template.dc.html).
    Illustrative figures; draw-on via .dgm-* (zeroed under prefers-reduced-motion);
    fixed viewBox = CLS 0. Literal hex matches diagram-role tokens (css-drift scans
    CSS only). Carded by the .diagram-feature wrapper at the call site. -#}
<figure class="diagram-feature">
  <figcaption class="diagram-feature__cap">
    <span class="diagram-feature__ticks" aria-hidden="true"><span></span><span></span></span>
    <span class="diagram-feature__label">Reconciliation flow</span>
  </figcaption>
  <svg viewBox="0 0 420 110" width="100%" style="display:block" role="img" aria-label="Book balance moving through three adjustments to a reconciled bank balance.">
    <rect x="0" y="30" width="120" height="58" rx="10" fill="#F5F8FC" stroke="#D4DCE7" stroke-width="1.5"/>
    <text x="14" y="22" font-family="Geist, sans-serif" font-size="11" fill="#62708A">Book balance</text>
    <text x="14" y="64" font-family="Geist Mono, monospace" font-size="16" font-weight="500" fill="#0A0F1C">21,430.00</text>
    <path class="dgm-draw2" d="M120 59 H158" fill="none" stroke="#B5C0D0" stroke-width="1.5"/>
    <path d="M152 54l6 5-6 5" fill="none" stroke="#B5C0D0" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="160" y="46" font-family="Geist Mono, monospace" font-size="11" fill="#A4660A">+ 3 adj.</text>
    <text x="160" y="74" font-family="Geist Mono, monospace" font-size="11" fill="#62708A">&minus;240.00</text>
    <path class="dgm-draw2" d="M230 59 H268" fill="none" stroke="#B5C0D0" stroke-width="1.5"/>
    <path d="M262 54l6 5-6 5" fill="none" stroke="#B5C0D0" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="268" y="30" width="152" height="58" rx="10" fill="#E7F5EE" stroke="#157A52" stroke-width="1.5"/>
    <text x="282" y="22" font-family="Geist, sans-serif" font-size="11" fill="#0F5E3F">Bank &middot; reconciled</text>
    <text x="282" y="64" font-family="Geist Mono, monospace" font-size="16" font-weight="600" fill="#0F5E3F">21,190.00</text>
    <g transform="translate(398 46)"><circle r="12" fill="#fff" stroke="#157A52" stroke-width="1.25"/><path class="dgm-tick" d="M-4.5 0l3 3.2 5.5-6.5" fill="none" stroke="#157A52" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></g>
  </svg>
</figure>
