    <text x="380" y="14" text-anchor="end" font-family="Geist Mono, monospace" font-size="10" letter-spacing="1.2" fill="#62708A">CREDIT</text>
    <path class="dgm-draw" d="M0 24 H380 M190 24 V160" fill="none" stroke="#B5C0D0" stroke-width="1.5" stroke-linecap="round"/>
    <g font-family="Geist, sans-serif" font-size="12.5" fill="#45516B"><text x="0" y="50">Opening</text><text x="0" y="78">Deposits</text><text x="210" y="50">Payments</text><text x="210" y="78">Closing</text></g>
    <g font-family="Geist Mono, monospace" font-size="12.5" font-weight="500" style="font-variant-numeric:tabular-nums"><text x="176" y="50" text-anchor="end" fill="#0A0F1C">12,400.00</text><text x="176" y="78" text-anchor="end" fill="#0A0F1C">48,210.00</text><text x="380" y="50" text-anchor="end" fill="#1E3A70">39,180.00</text><text x="380" y="78" text-anchor="end" fill="#1E3A70">21,430.00</text></g>
    <path d="M30 112 H176 M214 112 H380" stroke="#D4DCE7" stroke-width="1.5"/>
    <text x="176" y="134" text-anchor="end" font-family="Geist Mono, monospace" font-size="13" font-weight="600" fill="#0A0F1C" style="font-variant-numeric:tabular-nums">60,610.00</text>
    <text x="380" y="134" text-anchor="end" font-family="Geist Mono, monospace" font-size="13" font-weight="600" fill="#0A0F1C" style="font-variant-numeric:tabular-nums">60,610.00</text>
    <path d="M30 144 H176 M30 148 H176 M214 144 H380 M214 148 H380" stroke="#0A0F1C" stroke-width="1"/>
    <g transform="translate(190 182)"><circle r="13" fill="#E7F5EE" stroke="#157A52" stroke-width="1.25"/><path class="dgm-tick" d="M-5 0l3.2 3.4 6-7" fill="none" stroke="#157A52" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></g>
