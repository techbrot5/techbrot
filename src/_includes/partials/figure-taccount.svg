{#- Signature diagram — cash T-account, tied out (the home/hub source-validation
    cue). Captured from the Claude Design home hero. Illustrative figures; draw-on
    via .dgm-* (09-extensions), zeroed under prefers-reduced-motion; fixed viewBox
    = CLS 0. Literal hex matches the diagram-role tokens (css-drift scans CSS only). -#}
<figure class="hero-figure">
  <figcaption class="hero-figure__cap">
    <span class="hero-figure__title">Cash</span>
    <span class="hero-figure__tag">Oct &middot; reconciled</span>
  </figcaption>
  <svg data-viz="taccount-tieout" data-viz-state="FINAL" viewBox="0 0 380 196" width="100%" style="display:block" role="img" aria-label="A cash T-account with equal debit and credit totals, tied out.">
    <text x="0" y="14" font-family="Spline Sans Mono, monospace" font-size="10" letter-spacing="1.2" fill="var(--text-muted)">DEBIT</text>
    <text x="380" y="14" text-anchor="end" font-family="Spline Sans Mono, monospace" font-size="10" letter-spacing="1.2" fill="var(--text-muted)">CREDIT</text>
    <path class="dgm-draw" d="M0 24 H380 M190 24 V160" fill="none" stroke="var(--diagram-rule)" stroke-width="1.5" stroke-linecap="round"/>
    <g font-family="Geist, sans-serif" font-size="12.5" fill="var(--text-muted)"><text x="0" y="50">Opening</text><text x="0" y="78">Deposits</text><text x="210" y="50">Payments</text><text x="210" y="78">Closing</text></g>
    <g font-family="Spline Sans Mono, monospace" font-size="12.5" font-weight="500" style="font-variant-numeric:tabular-nums"><text x="176" y="50" text-anchor="end" fill="var(--diagram-debit)">12,400.00</text><text x="176" y="78" text-anchor="end" fill="var(--diagram-debit)">48,210.00</text><text x="380" y="50" text-anchor="end" fill="var(--diagram-credit)">39,180.00</text><text x="380" y="78" text-anchor="end" fill="var(--diagram-credit)">21,430.00</text></g>
    <path d="M30 112 H176 M214 112 H380" stroke="var(--border-default)" stroke-width="1.5"/>
    <text x="176" y="134" text-anchor="end" font-family="Spline Sans Mono, monospace" font-size="13" font-weight="600" fill="var(--diagram-debit)" style="font-variant-numeric:tabular-nums">60,610.00</text>
    <text x="380" y="134" text-anchor="end" font-family="Spline Sans Mono, monospace" font-size="13" font-weight="600" fill="var(--diagram-debit)" style="font-variant-numeric:tabular-nums">60,610.00</text>
    <path d="M30 144 H176 M30 148 H176 M214 144 H380 M214 148 H380" stroke="var(--diagram-debit)" stroke-width="1"/>
    <g transform="translate(190 182)"><circle r="13" fill="var(--tie-soft)" stroke="var(--diagram-tie)" stroke-width="1.25"/><path class="dgm-tick" d="M-5 0l3.2 3.4 6-7" fill="none" stroke="var(--diagram-tie)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></g>
  </svg>
</figure>
