{#- Signature diagram — cash T-account, tied out (the home/hub source-validation
    cue). Captured from the Claude Design home hero. Illustrative figures; draw-on
    via .dgm-* (09-extensions), zeroed under prefers-reduced-motion; fixed viewBox
    = CLS 0. Literal hex matches the diagram-role tokens (css-drift scans CSS only). -#}
<figure class="hero-figure">
  <figcaption class="hero-figure__cap">
    <span class="hero-figure__title">Cash</span>
    <span class="hero-figure__tag">Oct &middot; reconciled</span>
  </figcaption>
  <svg viewBox="0 0 380 196" width="100%" style="display:block" role="img" aria-label="A cash T-account with equal debit and credit totals, tied out.">
