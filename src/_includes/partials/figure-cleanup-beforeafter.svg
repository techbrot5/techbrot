{#- Signature diagram — before/after cleanup (the 2-second source-validation cue).
    Captured from the Claude Design money page. Illustrative figures (labelled);
    real numbers swap in per page. Draw-on via .dgm-* (09-extensions), zeroed under
    prefers-reduced-motion; fixed viewBox = CLS 0. Literal hex is intentional inside
    the SVG signature (matches the diagram-role tokens; css-drift scans CSS only). -#}
<figure class="hero-figure">
  <figcaption class="hero-figure__cap">
    <span class="hero-figure__title">A file, reconciled</span>
    <span class="hero-figure__tag">illustrative</span>
  </figcaption>
  <svg viewBox="0 0 440 232" width="100%" style="display:block" role="img" aria-label="An out-of-balance ledger resolving to a balanced, reconciled file.">
    <text x="0" y="14" font-family="Geist Mono, monospace" font-size="10.5" letter-spacing="1.2" fill="#62708A">BEFORE</text>
    <g font-family="Geist, sans-serif" font-size="12.5" fill="#45516B">
      <text x="0" y="46">Uncategorised</text>
      <text x="0" y="74">Unreconciled bank</text>
      <text x="0" y="102">Variance</text>
    </g>
    <g class="dgm-fade" font-family="Geist Mono, monospace" font-size="13" style="font-variant-numeric:tabular-nums">
      <text x="190" y="46" text-anchor="end" fill="#0A0F1C">142 txns</text>
      <text x="190" y="74" text-anchor="end" fill="#0A0F1C">3 accts</text>
      <text x="190" y="102" text-anchor="end" fill="#C0322C">&#8722;4,280.00</text>
    </g>
    <path class="dgm-draw2" d="M0 118 H190 M0 122 H190" fill="none" stroke="#C0322C" stroke-width="1" stroke-linecap="round"/>
    <g transform="translate(0 150)"><rect x="0" y="-15" width="150" height="26" rx="7" fill="#FCEDEC"/><path d="M14 -2v-5" stroke="#C0322C" stroke-width="2" stroke-linecap="round"/><circle cx="14" cy="3" r="1.1" fill="#C0322C"/><text x="28" y="2" font-family="Geist, sans-serif" font-size="11.5" fill="#9A2722">Out of balance</text></g>
    <path class="dgm-draw" d="M206 84 H250" fill="none" stroke="#B5C0D0" stroke-width="1.5"/><path d="M243 79l7 5-7 5" fill="none" stroke="#B5C0D0" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="266" y="14" font-family="Geist Mono, monospace" font-size="10.5" letter-spacing="1.2" fill="#62708A">AFTER</text>
    <g font-family="Geist, sans-serif" font-size="12.5" fill="#45516B">
      <text x="266" y="46">Categorised</text>
      <text x="266" y="74">Reconciled</text>
      <text x="266" y="102">Variance</text>
    </g>
    <g class="dgm-fade" font-family="Geist Mono, monospace" font-size="13" style="font-variant-numeric:tabular-nums">
      <text x="440" y="46" text-anchor="end" fill="#1E3A70">142 / 142</text>
      <text x="440" y="74" text-anchor="end" fill="#1E3A70">3 / 3</text>
      <text x="440" y="102" text-anchor="end" fill="#0F5E3F">0.00</text>
    </g>
    <path class="dgm-draw2" d="M266 118 H440 M266 122 H440" fill="none" stroke="#0A0F1C" stroke-width="1" stroke-linecap="round"/>
    <g transform="translate(266 150)"><rect x="0" y="-15" width="128" height="26" rx="7" fill="#E7F5EE"/><path class="dgm-tick" d="M14 -2l3.4 3.6 6.6-7.6" fill="none" stroke="#157A52" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><text x="32" y="2" font-family="Geist, sans-serif" font-size="11.5" fill="#0F5E3F">Reconciled &middot; tied out</text></g>
    <line x1="0" y1="196" x2="440" y2="196" stroke="#F0F3F8" stroke-width="1"/>
    <text x="0" y="218" font-family="Geist, sans-serif" font-size="11.5" fill="#62708A">Every account agreed to the bank, ready for your CPA.</text>
  </svg>
</figure>
