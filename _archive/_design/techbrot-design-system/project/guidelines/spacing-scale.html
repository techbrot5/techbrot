<!-- @dsCard group="Spacing" viewport="700x230" name="Space scale" subtitle="4px base · sections breathe at --space-16 → --space-24" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 18px 24px; background: var(--bg-page); }
  .step { display: grid; grid-template-columns: 90px 1fr; gap: 14px; align-items: center; padding-block: 4px; }
  .tok { font-family: var(--font-mono); font-size: 10px; color: var(--text-secondary); }
  .bar { height: 14px; background: var(--color-accent); opacity: 0.85; border-radius: 1px; }
</style>
</head>
<body>
  <div class="step"><span class="tok">--space-2 · 8px</span><div class="bar" style="width: 8px;"></div></div>
  <div class="step"><span class="tok">--space-4 · 16px</span><div class="bar" style="width: 16px;"></div></div>
  <div class="step"><span class="tok">--space-6 · 24px</span><div class="bar" style="width: 24px;"></div></div>
  <div class="step"><span class="tok">--space-8 · 32px</span><div class="bar" style="width: 32px;"></div></div>
  <div class="step"><span class="tok">--space-12 · 48px</span><div class="bar" style="width: 48px;"></div></div>
  <div class="step"><span class="tok">--space-16 · 64px</span><div class="bar" style="width: 64px;"></div></div>
  <div class="step"><span class="tok">--space-24 · 96px</span><div class="bar" style="width: 96px;"></div></div>
  <div class="step"><span class="tok">--space-32 · 128px</span><div class="bar" style="width: 128px;"></div></div>
  <div class="step"><span class="tok">--space-40 · 160px</span><div class="bar" style="width: 160px;"></div></div>
</body>
</html>
