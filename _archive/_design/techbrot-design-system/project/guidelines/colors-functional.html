<!-- @dsCard group="Colors" viewport="700x150" name="Functional colors" subtitle="Focus is blue on purpose — distinct from the brand accent" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 16px; background: var(--bg-page); }
  .row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .sw { border: 1px solid var(--border-hairline); border-radius: var(--radius-sm); overflow: hidden; }
  .sw__chip { height: 56px; }
  .sw__meta { padding: 8px 10px; }
  .sw__name { font-family: var(--font-mono); font-size: 11px; color: var(--text-primary); }
  .sw__val { font-family: var(--font-mono); font-size: 10px; color: var(--text-secondary); margin-top: 2px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="sw__chip" style="background: var(--color-focus);"></div><div class="sw__meta"><div class="sw__name">--color-focus</div><div class="sw__val">#0F4FCC · focus rings only</div></div></div>
    <div class="sw"><div class="sw__chip" style="background: var(--color-success);"></div><div class="sw__meta"><div class="sw__name">--color-success</div><div class="sw__val">#1F6F3F · confirmation</div></div></div>
    <div class="sw"><div class="sw__chip" style="background: var(--color-warning);"></div><div class="sw__meta"><div class="sw__name">--color-warning</div><div class="sw__val">#B07410 · caution</div></div></div>
  </div>
</body>
</html>
