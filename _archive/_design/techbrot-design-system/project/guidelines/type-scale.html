<!-- @dsCard group="Type" viewport="700x400" name="Type scale" subtitle="--fs-12 … --fs-68 · serif above 24, sans below" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 18px 24px; background: var(--bg-page); }
  .step { display: grid; grid-template-columns: 64px 1fr; gap: 16px; align-items: baseline; padding-block: 6px; border-bottom: 1px solid var(--border-hairline); }
  .step:last-child { border-bottom: none; }
  .tok { font-family: var(--font-mono); font-size: 10px; color: var(--text-secondary); }
  .sample { color: var(--text-primary); line-height: 1.1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .serif { font-family: var(--font-serif); letter-spacing: var(--ls-snug); }
  .sans { font-family: var(--font-sans); }
</style>
</head>
<body>
  <div class="step"><span class="tok">--fs-68</span><span class="sample serif" style="font-size: var(--fs-68); letter-spacing: var(--ls-tight);">Judgment</span></div>
  <div class="step"><span class="tok">--fs-52</span><span class="sample serif" style="font-size: var(--fs-52); letter-spacing: var(--ls-tight);">Reconciled</span></div>
  <div class="step"><span class="tok">--fs-38</span><span class="sample serif" style="font-size: var(--fs-38);">Section heading</span></div>
  <div class="step"><span class="tok">--fs-28</span><span class="sample serif" style="font-size: var(--fs-28);">Subsection heading</span></div>
  <div class="step"><span class="tok">--fs-22</span><span class="sample serif" style="font-size: var(--fs-22);">Card heading set in Fraunces</span></div>
  <div class="step"><span class="tok">--fs-17</span><span class="sample sans" style="font-size: var(--fs-17);">Body copy at the 17px base size — Inter regular</span></div>
  <div class="step"><span class="tok">--fs-15</span><span class="sample sans" style="font-size: var(--fs-15);">Card body and UI copy</span></div>
  <div class="step"><span class="tok">--fs-13</span><span class="sample sans" style="font-size: var(--fs-13);">Captions, breadcrumbs, proof labels</span></div>
  <div class="step"><span class="tok">--fs-12</span><span class="sample sans" style="font-size: var(--fs-12); letter-spacing: var(--ls-wide); text-transform: uppercase; color: var(--text-eyebrow);">Eyebrow labels</span></div>
</body>
</html>
