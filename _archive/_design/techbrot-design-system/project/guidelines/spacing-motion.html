<!-- @dsCard group="Spacing" viewport="700x170" name="Motion" subtitle="Fast and damped · 120–600ms · ease-out cubic-bezier(0.16, 1, 0.3, 1)" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 18px 24px; background: var(--bg-page); }
  .lane { display: grid; grid-template-columns: 150px 1fr; align-items: center; gap: 14px; padding-block: 7px; border-bottom: 1px solid var(--border-hairline); }
  .lane:last-child { border-bottom: none; }
  .tok { font-family: var(--font-mono); font-size: 10px; color: var(--text-secondary); }
  .track { position: relative; height: 10px; }
  .dot { position: absolute; top: 0; left: 0; width: 10px; height: 10px; border-radius: 50%; background: var(--color-accent); animation: run 2.4s var(--ease-out) infinite; }
  @keyframes run { 0% { left: 0; } 45%, 100% { left: calc(100% - 10px); } }
  .note { font-size: 11px; color: var(--text-secondary); margin-top: 10px; font-style: italic; }
</style>
</head>
<body>
  <div class="lane"><span class="tok">--motion-fast · 120ms · press</span><div class="track"><div class="dot" style="animation-duration: 1.2s;"></div></div></div>
  <div class="lane"><span class="tok">--motion-base · 200ms · color/border</span><div class="track"><div class="dot" style="animation-duration: 2s;"></div></div></div>
  <div class="lane"><span class="tok">--motion-slow · 360ms · card lift</span><div class="track"><div class="dot" style="animation-duration: 3.6s;"></div></div></div>
  <p class="note">No bounces, no parallax, no scroll theatrics. prefers-reduced-motion zeroes everything at the token level.</p>
</body>
</html>
