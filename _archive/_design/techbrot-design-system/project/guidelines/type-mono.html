<!-- @dsCard group="Type" viewport="700x150" name="JetBrains Mono — meta" subtitle="Question IDs, token names, knowledge-base labels" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 20px 24px; background: var(--bg-page); }
  .mono { font-family: var(--font-mono); }
  .id { font-size: 13px; letter-spacing: 0.05em; color: var(--color-accent); font-weight: 500; }
  .label { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-secondary); margin-top: 10px; }
  .code { display: inline-block; margin-top: 12px; font-size: 13px; background: var(--color-paper-deep); padding: 2px 8px; border-radius: var(--radius-xs); color: var(--text-primary); }
  .meta { font-family: var(--font-mono); font-size: 10px; color: var(--text-secondary); margin-top: 14px; }
</style>
</head>
<body>
  <span class="mono id">Q-014</span>
  <p class="mono label">Last reviewed · June 2026</p>
  <span class="mono code">Banking → Reconcile → Undo last reconciliation</span>
  <p class="meta">--font-mono · JetBrains Mono · used only in kb-* meta, IDs, code</p>
</body>
</html>
