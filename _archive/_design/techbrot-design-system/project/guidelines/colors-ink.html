<!-- @dsCard group="Colors" viewport="700x150" name="Ink — text ramp" subtitle="Near-black ink does the work; four steps of recession" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 16px; background: var(--bg-page); }
  .row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .sw { border: 1px solid var(--border-hairline); border-radius: var(--radius-sm); overflow: hidden; }
  .sw__chip { height: 64px; }
  .sw__meta { padding: 8px 10px; }
  .sw__name { font-family: var(--font-mono); font-size: 11px; color: var(--text-primary); }
  .sw__val { font-family: var(--font-mono); font-size: 10px; color: var(--text-secondary); margin-top: 2px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="sw__chip" style="background: var(--color-ink);"></div><div class="sw__meta"><div class="sw__name">--color-ink</div><div class="sw__val">#0B0B0B · headings</div></div></div>
    <div class="sw"><div class="sw__chip" style="background: var(--color-ink-soft);"></div><div class="sw__meta"><div class="sw__name">--color-ink-soft</div><div class="sw__val">#2A2A28 · body</div></div></div>
    <div class="sw"><div class="sw__chip" style="background: var(--color-ink-mute);"></div><div class="sw__meta"><div class="sw__name">--color-ink-mute</div><div class="sw__val">#5A5A56 · secondary</div></div></div>
    <div class="sw"><div class="sw__chip" style="background: var(--color-ink-faint);"></div><div class="sw__meta"><div class="sw__name">--color-ink-faint</div><div class="sw__val">#8B8B85 · eyebrows</div></div></div>
  </div>
</body>
</html>
