<!-- @dsCard group="Colors" viewport="700x170" name="Accent — oxblood" subtitle="One chromatic note, used sparingly (<5% of any page)" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 16px; background: var(--bg-page); }
  .row { display: grid; grid-template-columns: 1.4fr 1fr 1fr 1.2fr; gap: 10px; }
  .sw { border: 1px solid var(--border-hairline); border-radius: var(--radius-sm); overflow: hidden; }
  .sw__chip { height: 64px; display: flex; align-items: flex-end; padding: 8px 10px; }
  .sw__meta { padding: 8px 10px; }
  .sw__name { font-family: var(--font-mono); font-size: 11px; color: var(--text-primary); }
  .sw__val { font-family: var(--font-mono); font-size: 10px; color: var(--text-secondary); margin-top: 2px; }
  .flag { font-size: 10px; font-family: var(--font-sans); color: var(--color-paper); background: rgba(11,11,11,0.35); padding: 2px 6px; border-radius: 2px; }
  .tint { background: rgba(132, 30, 30, 0.04); border-inline-start: 2px solid var(--color-accent); height: 64px; display: flex; align-items: center; padding-inline: 10px; font-size: 12px; color: var(--text-body); font-family: var(--font-sans); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="sw__chip" style="background: var(--color-accent);"></div><div class="sw__meta"><div class="sw__name">--color-accent</div><div class="sw__val">#841E1E · the signal</div></div></div>
    <div class="sw"><div class="sw__chip" style="background: var(--color-accent-deep);"></div><div class="sw__meta"><div class="sw__name">--color-accent-deep</div><div class="sw__val">#6B1818 · hover</div></div></div>
    <div class="sw"><div class="sw__chip" style="background: var(--color-accent-soft);"><span class="flag">avoid — vestigial</span></div><div class="sw__meta"><div class="sw__name">--color-accent-soft</div><div class="sw__val">#B85050 · do not use</div></div></div>
    <div class="sw"><div class="tint">4% tint + 2px rule<br>= "us" emphasis</div><div class="sw__meta"><div class="sw__name">rgba(132,30,30,.04)</div><div class="sw__val">only sanctioned fill</div></div></div>
  </div>
</body>
</html>
