<!-- @dsCard group="Spacing" viewport="700x150" subtitle="120–200ms fades, ≤4px translates, ease-out. Hover the cards." name="Motion & states" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
body{padding:24px;display:flex;gap:16px;align-items:center}
.demo{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-md);padding:14px 18px;font-size:var(--text-sm);cursor:pointer;
  transition:box-shadow var(--duration-base) var(--ease-out),border-color var(--duration-base) var(--ease-out),transform var(--duration-fast) var(--ease-out)}
.demo:hover{box-shadow:var(--shadow-sm);border-color:var(--line-strong)}
.demo:active{transform:translateY(0.5px)}
.btn{background:var(--btn-primary-bg);color:var(--btn-primary-fg);border:none;border-radius:var(--radius-sm);padding:10px 18px;font:inherit;font-size:var(--text-sm);font-weight:var(--weight-medium);cursor:pointer;transition:background var(--duration-fast) var(--ease-out)}
.btn:hover{background:var(--btn-primary-bg-hover)}
.n{font-family:var(--font-mono);font-size:10.5px;color:var(--text-muted)}
</style>
</head><body>
<div class="demo">Card hover → shadow-sm + border-strong</div>
<button class="btn">Button hover → one step lighter</button>
<span class="n">no bounces · no parallax · reduced-motion honored</span>
</body></html>
