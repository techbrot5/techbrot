<style>
body{margin:0;background:var(--color-surface-dark)}
.hero--hub{position:relative;overflow:hidden;background:var(--color-surface-dark);min-height:720px;display:flex;align-items:center}
.hero__motif{position:absolute;top:0;right:0;height:100%;width:40%;max-width:560px;color:var(--color-accent-soft);pointer-events:none}
.hero__motif svg{height:100%;width:100%;display:block}
.container{max-width:1240px;margin:0 auto;padding:0 2rem;width:100%;position:relative}
.hero{max-width:55%;position:relative;z-index:1}
.hero__eyebrow{font-family:var(--font-sans);font-size:0.75rem;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:var(--color-ink-inverted-mute);margin:0 0 1.5rem}
.hero__heading{font-family:var(--font-serif);font-size:4.25rem;font-weight:560;font-variation-settings:"opsz" 90,"SOFT" 0,"WONK" 0;letter-spacing:-0.02em;line-height:1.05;color:var(--color-ink-inverted);margin:0 0 1.5rem;text-wrap:balance}
.hero__subheading{font-family:var(--font-sans);font-size:1.25rem;line-height:1.55;color:var(--color-ink-inverted-soft);max-width:34em;margin:0 0 2.5rem}
.hero__actions{display:flex;gap:0.75rem;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;justify-content:center;font-family:var(--font-sans);font-weight:500;font-size:1rem;height:48px;padding:0 1.5rem;border-radius:6px;text-decoration:none;transition:background 120ms cubic-bezier(.2,.7,.2,1),color 120ms cubic-bezier(.2,.7,.2,1),border-color 120ms cubic-bezier(.2,.7,.2,1)}
.btn--primary.btn--inverted{background:var(--color-ink-inverted);color:var(--color-ink)}
.btn--primary.btn--inverted:hover{background:#FFFFFF}
.btn--ghost.btn--inverted{border:1px solid rgba(245,243,236,0.35);color:var(--color-ink-inverted)}
.btn--ghost.btn--inverted:hover{border-color:var(--color-ink-inverted);color:var(--color-ink-inverted)}
