<!-- @dsCard group="Conversion" viewport="700x440" subtitle="#17 — skip-link + focus-visible states on light and dark (teal ring #118A7E, ≥3.5:1 every surface). Tab through it." name="skip-link & focus states" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../handoff/fonts-preview.css">
<link rel="stylesheet" href="../handoff/01-tokens.SKIN.css">
<link rel="stylesheet" href="../handoff/02-conversion.SKIN.css">
<link rel="stylesheet" href="../handoff/03-chrome.SKIN.css">
<style>
body{margin:0;font-family:var(--font-sans)}
.band{padding:24px 32px;display:flex;gap:14px;align-items:center;flex-wrap:wrap}
.band--light{background:var(--bg-page)}
.band--deep{background:var(--surface-tier-bofu)}
.band--dark{background:var(--color-surface-dark)}
.tag{font-family:var(--font-mono);font-size:10.5px;color:var(--text-secondary);width:100%;margin:0 0 4px}
.band--dark .tag{color:var(--color-ink-inverted-mute)}
/* simulated :focus-visible */
.sim-focus{outline:2px solid var(--color-focus);outline-offset:2px;border-radius:4px}
.skip-link--demo{position:static;display:inline-block;background:var(--color-ink);color:var(--color-ink-inverted);padding:12px 20px;border-radius:0 0 6px 6px;text-decoration:none;font-size:0.875rem}
input.demo{font:inherit;font-size:0.9375rem;height:44px;padding:0 12px;border:1px solid var(--color-focus);border-radius:6px;box-shadow:var(--shadow-focus);background:#fff;width:200px}
a.plain{color:var(--text-primary);font-size:0.9375rem}
</style>
</head><body>
<div class="band band--light">
  <p class="tag">skip-link (revealed on focus) · focused button · focused input (ring + border)</p>
  <a class="skip-link--demo sim-focus" href="#main">Skip to content</a>
  <button class="btn btn--primary sim-focus" type="button">Focused primary</button>
  <input class="demo" placeholder="Focused input" readonly>
</div>
<div class="band band--deep">
  <p class="tag">on the deepest tier tint — ring 3.52:1</p>
  <button class="btn btn--ghost sim-focus" type="button">Focused ghost</button>
  <a class="plain sim-focus" href="#">Focused text link</a>
</div>
<div class="band band--dark">
  <p class="tag">on dark — ring 4.24:1, never confusable with cobalt links</p>
  <button class="btn btn--primary btn--inverted sim-focus" type="button">Focused inverted</button>
  <button class="btn btn--ghost btn--inverted sim-focus" type="button">Focused inverted ghost</button>
</div>
</body></html>
