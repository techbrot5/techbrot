<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<link rel="stylesheet" href="../handoff/skin-tokens-draft.css">
<style>
body{margin:0;background:var(--surface-tier-bofu)}
.hero--compact{background:var(--surface-tier-bofu);padding:88px 0 72px}
.container{max-width:1240px;margin:0 auto;padding:0 2rem}
.hero{max-width:46em}
.hero__heading::before{content:"";display:block;width:48px;height:3px;margin-bottom:1.5rem;
  background:linear-gradient(90deg,var(--accent) 0 30px,transparent 30px 34px,var(--accent) 34px 48px)}
.hero__eyebrow{font-family:var(--font-sans);font-size:0.75rem;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:var(--text-eyebrow);margin:0 0 1.25rem}
.hero__heading{font-family:var(--font-serif);font-size:2.75rem;font-weight:560;font-variation-settings:"opsz" 40,"SOFT" 0,"WONK" 0;letter-spacing:-0.012em;line-height:1.15;color:var(--text-primary);margin:0 0 1rem;max-width:12.5em;text-wrap:balance}
.hero__subheading{font-family:var(--font-sans);font-size:1.125rem;line-height:1.55;color:var(--text-body);max-width:36em;margin:0 0 2rem}
.hero__actions{display:flex;gap:0.75rem;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;justify-content:center;font-family:var(--font-sans);font-weight:500;font-size:1rem;height:48px;padding:0 1.5rem;border-radius:6px;text-decoration:none;transition:background 120ms cubic-bezier(.2,.7,.2,1),border-color 120ms cubic-bezier(.2,.7,.2,1)}
.btn--primary{background:var(--color-ink);color:var(--color-ink-inverted)}
.btn--primary:hover{background:var(--color-accent-deep)}
.btn--ghost{border:1px solid var(--color-paper-edge);color:var(--text-primary);background:var(--bg-card)}
.btn--ghost:hover{border-color:var(--color-ink-faint)}
</style>
</head><body>
<section class="section hero-tier hero--compact section--tier-bofu" id="example-hero" data-screen-label="T-BOFU hero">
  <div class="container">
    <div class="hero">
      <p class="hero__eyebrow">Free · No commitment</p>
      <h1 class="hero__heading">Get a free QuickBooks file review.</h1>
      <p class="hero__subheading">A certified ProAdvisor reads your file, documents what's broken, and hands you a written fixed-fee scope. You decide what happens next.</p>
      <div class="hero__actions">
        <a class="btn btn--primary btn--lg" href="#">Start the file review</a>
        <a class="btn btn--ghost btn--lg" href="tel:+1">Call us instead</a>
      </div>
    </div>
  </div>
</section>
</body></html>
