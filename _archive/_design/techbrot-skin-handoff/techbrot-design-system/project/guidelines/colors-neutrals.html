<!-- @dsCard group="Colors" viewport="700x170" subtitle="Warm paper & ink — never pure black on pure white" name="Ink & paper" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
body{padding:20px 24px}
.r{display:grid;grid-template-columns:repeat(8,1fr);gap:8px}
.s{height:64px;border-radius:var(--radius-sm);border:1px solid var(--line)}
.n{font-family:var(--font-mono);font-size:10.5px;color:var(--text-muted);margin-top:6px}
</style>
</head><body>
<div class="r">
  <div><div class="s" style="background:var(--paper)"></div><div class="n">--paper</div></div>
  <div><div class="s" style="background:var(--surface)"></div><div class="n">--surface</div></div>
  <div><div class="s" style="background:var(--surface-sunken)"></div><div class="n">--surface-sunken</div></div>
  <div><div class="s" style="background:var(--line)"></div><div class="n">--line</div></div>
  <div><div class="s" style="background:var(--line-strong)"></div><div class="n">--line-strong</div></div>
  <div><div class="s" style="background:var(--ink-500)"></div><div class="n">--ink-500</div></div>
  <div><div class="s" style="background:var(--ink-700)"></div><div class="n">--ink-700</div></div>
  <div><div class="s" style="background:var(--ink-900)"></div><div class="n">--ink-900</div></div>
</div>
</body></html>
