<html lang="en"><head><meta charset="utf-8">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

<div id="root"></div>
<script type="text/babel">
const { ProcessFlow, ComparisonGrid, DecisionTree, BarChart } = window.TechBrotDesignSystem_de93db;
ReactDOM.createRoot(document.getElementById("root")).render(
  <div style={{ display: "grid", gap: 32 }}>
    <ProcessFlow
      steps={[
        { label: "Transactions in", sublabel: "bank feeds + receipts" },
        { label: "Weekly reconcile", sublabel: "cadence: 7 days", highlight: true },
        { label: "Review", sublabel: "exceptions only" },
        { label: "Close", sublabel: "day 3" },
      ]}
    />
    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 28, alignItems: "start" }}>
      <ComparisonGrid
        options={["QBO", "Xero", "NetSuite"]}
        highlightColumn={0}
        criteria={[
          { label: "Multi-location inventory", values: [1, 1, 2] },
          { label: "Native payroll", values: [2, 1, 0] },
          { label: "Starting price / mo", values: ["$35", "$20", "$1,250"] },
        ]}
      />
      <BarChart
        caption="Median days to close (n = 247)"
        unit=" days"
        data={[
          { label: "Weekly reconcile", value: 3.1, highlight: true },
          { label: "Biweekly", value: 6.8 },
          { label: "Monthly", value: 13.0 },
        ]}
      />
    </div>
    <DecisionTree
      caption="Choosing your accounting platform — simplified"
      root={{
        label: "Inventory across\nmultiple locations?",
        yes: { label: "Revenue > $25M?", yes: { label: "NetSuite tier" }, no: { label: "QBO Advanced" } },
        no: { label: "QBO Plus / Xero" },
      }}
    />
  </div>
);
</script>
