<!-- @dsCard group="Motif" viewport="1200x630" subtitle="OG-card template, 1200×630 — dark surface, cropped Alignment Field, Fraunces title slot" name="OG card template" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<link rel="stylesheet" href="../../handoff/skin-tokens-draft.css">
<style>
/* OG-card template for the batch generator (go-remote gate item 6).
   Fixed 1200×630. Swap .og__kicker / .og__title text per page;
   screenshot at 1200×630 → assets/og/<slug>-og.png. */
body{margin:0}
.og{width:1200px;height:630px;background:var(--color-surface-dark);position:relative;overflow:hidden;font-family:var(--font-sans);display:flex;flex-direction:column;justify-content:space-between;padding:64px 72px;box-sizing:border-box}
.og__motif{position:absolute;top:-60px;right:-40px;height:760px;color:var(--color-accent-soft);opacity:0.85}
.og__motif svg{height:100%;width:auto;display:block}
.og__kicker{position:relative;font-size:22px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:var(--color-ink-inverted-mute);margin:0}
.og__title{position:relative;font-family:var(--font-serif);font-size:76px;font-weight:560;font-variation-settings:"opsz" 90,"SOFT" 0,"WONK" 0;letter-spacing:-0.02em;line-height:1.05;color:var(--color-ink-inverted);margin:0;max-width:760px;text-wrap:balance}
.og__foot{position:relative;display:flex;align-items:center;gap:20px}
.og__foot svg{display:block}
.og__domain{font-family:var(--font-mono);font-size:22px;color:var(--color-ink-inverted-mute)}
</style>
</head><body>
<div class="og" data-screen-label="OG card">
  <div class="og__motif" aria-hidden="true">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="280 36 280 640" width="280" height="640" fill="currentColor">
      <rect x="40"  y="36"  width="88"  height="24" opacity="0.18"></rect><rect x="138" y="36"  width="350" height="24" opacity="0.18"></rect>
      <rect x="72"  y="92"  width="376" height="24" opacity="0.22"></rect><rect x="458" y="92"  width="62"  height="24" opacity="0.22"></rect>
      <rect x="40"  y="148" width="156" height="24" opacity="0.26"></rect><rect x="206" y="148" width="314" height="24" opacity="0.26"></rect>
      <rect x="40"  y="204" width="380" height="24" opacity="0.30"></rect><rect x="430" y="204" width="74"  height="24" opacity="0.30"></rect>
      <rect x="56"  y="260" width="196" height="24" opacity="0.35"></rect><rect x="262" y="260" width="258" height="24" opacity="0.35"></rect>
      <rect x="40"  y="316" width="364" height="24" opacity="0.40"></rect><rect x="414" y="316" width="106" height="24" opacity="0.40"></rect>
      <rect x="40"  y="372" width="272" height="24" opacity="0.47"></rect><rect x="322" y="372" width="198" height="24" opacity="0.47"></rect>
      <rect x="40"  y="428" width="356" height="24" opacity="0.55"></rect><rect x="406" y="428" width="106" height="24" opacity="0.55"></rect>
      <rect x="40"  y="484" width="308" height="24" opacity="0.64"></rect><rect x="358" y="484" width="162" height="24" opacity="0.64"></rect>
      <rect x="40"  y="540" width="340" height="24" opacity="0.75"></rect><rect x="390" y="540" width="130" height="24" opacity="0.75"></rect>
      <rect x="40"  y="596" width="332" height="24" opacity="0.87"></rect><rect x="382" y="596" width="138" height="24" opacity="0.87"></rect>
      <rect x="40"  y="652" width="332" height="24" opacity="1"></rect><rect x="382" y="652" width="138" height="24" opacity="1"></rect>
    </svg>
  </div>
  <p class="og__kicker">QuickBooks · Free service</p>
  <h1 class="og__title">Get a free QuickBooks file review.</h1>
  <div class="og__foot">
    <svg viewBox="0 0 64 64" width="56" height="56" role="img" aria-label="TechBrot">
      <g fill="#F5F3EC">
        <path d="M8 10 H38 V54 H26 V22 H8 Z"></path>
        <rect x="42" y="10" width="14" height="12"></rect>
      </g>
    </svg>
    <span class="og__domain">techbrot.com</span>
  </div>
</div>
</body></html>
