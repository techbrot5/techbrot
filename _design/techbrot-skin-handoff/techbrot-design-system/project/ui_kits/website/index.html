<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TechBrot — Accounting technology advisory</title>
<link rel="icon" href="../../assets/logo/techbrot-favicon.svg">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head><body>
<div id="root"></div>
<script type="text/babel">
const { HomeScreen, ArticleScreen, ServicesScreen } = window.TechBrotDesignSystem_de93db;

function Site() {
  const [screen, setScreen] = React.useState(
    () => localStorage.getItem("tb-website-screen") || "home"
  );
  const go = (label) => {
    const map = {
      home: "home",
      Services: "services",
      Methodology: "services",
      Research: "article",
      About: "home",
    };
    const next = map[label] || "home";
    setScreen(next);
    localStorage.setItem("tb-website-screen", next);
    window.scrollTo(0, 0);
  };
  if (screen === "article") return <ArticleScreen onNavigate={go} />;
  if (screen === "services") return <ServicesScreen onNavigate={go} />;
  return <HomeScreen onNavigate={go} />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<Site />);
</script>
</body></html>
