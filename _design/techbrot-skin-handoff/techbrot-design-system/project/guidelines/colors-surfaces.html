<!-- @dsCard group="Colors" viewport="700x190" subtitle="Surface layering — paper page, white card, sunken well, inverted ink band" name="Surfaces" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
body{padding:20px 24px;display:grid;grid-template-columns:1fr 1fr;gap:12px}
.lbl{font-family:var(--font-mono);font-size:10.5px;color:var(--text-muted);margin-top:8px}
</style>
</head><body>
<div>
  <div style="background:var(--paper);border:1px solid var(--line);border-radius:var(--radius-md);padding:14px;">
    <div style="background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-sm);padding:10px 12px;font-size:var(--text-sm);">Card on paper</div>
    <div style="background:var(--surface-sunken);border-radius:var(--radius-sm);padding:10px 12px;font-size:var(--text-sm);margin-top:8px;color:var(--text-secondary);">Sunken well</div>
  </div>
  <div class="lbl">--paper → --surface → --surface-sunken</div>
</div>
<div>
  <div style="background:var(--ink-surface);border-radius:var(--radius-md);padding:14px;">
    <div style="color:var(--paper-on-ink);font-family:var(--font-display);font-size:var(--text-xl);font-weight:var(--weight-heading);">Inverted band</div>
    <div style="color:var(--muted-on-ink);font-size:var(--text-sm);margin-top:4px;border-top:1px solid var(--line-on-ink);padding-top:8px;">--paper-on-ink · --muted-on-ink · --line-on-ink</div>
  </div>
  <div class="lbl">--ink-surface — footers & contrast bands only</div>
</div>
</body></html>
