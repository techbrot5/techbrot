<!-- @dsCard group="Chrome" viewport="390x760" subtitle="Mobile drawer open — accordion groups, phone + CTA pinned at the foot, focus-trap contract unchanged" name="mobile drawer" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../styles.css">
<link rel="stylesheet" href="../handoff/01-tokens.SKIN.css">
<link rel="stylesheet" href="../handoff/02-conversion.SKIN.css">
<link rel="stylesheet" href="../handoff/03-chrome.SKIN.css">
<style>body{margin:0;background:var(--bg-page);font-family:var(--font-sans);min-height:760px}
.reopen{position:fixed;top:16px;left:16px;z-index:1}</style>
</head><body>
<button class="btn btn--primary reopen" type="button" id="reopen">Open menu</button>
<div class="drawer" data-open="true" role="dialog" aria-modal="true" aria-label="Menu">
  <div class="drawer__head">
    <svg viewBox="0 0 64 64" height="30" role="img" aria-label="TechBrot"><g fill="#1A1915"><path d="M8 10 H38 V54 H26 V22 H8 Z"></path><rect x="42" y="10" width="14" height="12"></rect></g></svg>
    <button class="drawer__close" type="button" aria-label="Close menu"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 6 6 18"></path><path d="m6 6 12 12"></path></svg></button>
  </div>
  <div class="drawer__group">
    <button class="drawer__trigger" type="button" aria-expanded="true" aria-controls="dg-services">Services</button>
    <div class="drawer__panel" id="dg-services" data-open="true">
      <ul>
        <li><a href="#">Monthly bookkeeping</a></li>
        <li><a href="#">Cleanup &amp; catch-up</a></li>
        <li><a href="#">QuickBooks setup &amp; migration</a></li>
        <li><a href="#">Fractional CFO</a></li>
      </ul>
    </div>
  </div>
  <div class="drawer__group">
    <button class="drawer__trigger" type="button" aria-expanded="false" aria-controls="dg-qb">QuickBooks</button>
    <div class="drawer__panel" id="dg-qb" data-open="false"><ul><li><a href="#">File review</a></li><li><a href="#">Cleanup tiers</a></li></ul></div>
  </div>
  <div class="drawer__group"><a class="drawer__link" href="#">Pricing</a></div>
  <div class="drawer__group"><a class="drawer__link" href="#">Resources</a></div>
  <div class="drawer__group"><a class="drawer__link" href="#">About</a></div>
  <div class="drawer__foot">
    <a class="phone-cta" href="tel:+15555550143" data-tb-event="phone_click">
      <span class="phone-cta__icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg></span>
      <span><span class="phone-cta__number">(555) 555-0143</span><span class="phone-cta__note">NAP placeholder — site.json</span></span>
    </a>
    <a class="btn btn--primary btn--lg" href="#">Book the discovery call</a>
  </div>
</div>
<script>
(function(){
  var drawer=document.querySelector('.drawer');
  document.getElementById('reopen').addEventListener('click',function(){drawer.setAttribute('data-open','true');drawer.querySelector('.drawer__close').focus();});
  drawer.querySelector('.drawer__close').addEventListener('click',function(){drawer.setAttribute('data-open','false');document.getElementById('reopen').focus();});
  document.addEventListener('keydown',function(e){if(e.key==='Escape'&&drawer.getAttribute('data-open')==='true'){drawer.setAttribute('data-open','false');document.getElementById('reopen').focus();}});
  drawer.addEventListener('click',function(e){
    var t=e.target.closest('.drawer__trigger'); if(!t)return;
    var open=t.getAttribute('aria-expanded')==='true';
    t.setAttribute('aria-expanded',String(!open));
    document.getElementById(t.getAttribute('aria-controls')).setAttribute('data-open',String(!open));
  });
})();
</script>
</body></html>
