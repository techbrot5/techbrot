<!-- @dsCard group="Spacing" viewport="700x170" subtitle="Calm radii — 6 inputs, 10 cards, 16 panels, full for avatars only" name="Radii" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
body{padding:20px 24px;display:flex;gap:16px;align-items:flex-end}
.b{background:var(--surface);border:1px solid var(--line-strong);width:96px;height:72px}
.n{font-family:var(--font-mono);font-size:10.5px;color:var(--text-muted);margin-top:6px;text-align:center}
</style>
</head><body>
<div><div class="b" style="border-radius:var(--radius-xs)"></div><div class="n">xs · 4</div></div>
<div><div class="b" style="border-radius:var(--radius-sm)"></div><div class="n">sm · 6</div></div>
<div><div class="b" style="border-radius:var(--radius-md)"></div><div class="n">md · 10</div></div>
<div><div class="b" style="border-radius:var(--radius-lg)"></div><div class="n">lg · 16</div></div>
<div><div class="b" style="border-radius:var(--radius-xl)"></div><div class="n">xl · 24</div></div>
<div><div class="b" style="border-radius:var(--radius-full);width:72px"></div><div class="n">full</div></div>
</body></html>
