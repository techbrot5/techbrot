<!-- @dsCard group="Colors" viewport="700x180" subtitle="Muted semantics — used in badges, callouts, table deltas. Rare by design." name="Semantic" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
body{padding:20px 24px}
.r{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.chip{display:flex;align-items:center;gap:10px;border:1px solid var(--line);border-radius:var(--radius-md);padding:12px 14px;background:var(--surface)}
.dot{width:28px;height:28px;border-radius:var(--radius-xs);flex:none}
.n{font-family:var(--font-mono);font-size:10.5px;color:var(--text-muted)}
b{font-size:var(--text-sm);font-weight:var(--weight-semibold)}
</style>
</head><body>
<div class="r">
  <div class="chip"><div class="dot" style="background:var(--positive-600)"></div><div><b>Positive</b><div class="n">positive-600 / -100</div></div><div class="dot" style="background:var(--positive-100);margin-left:auto"></div></div>
  <div class="chip"><div class="dot" style="background:var(--warning-600)"></div><div><b>Warning</b><div class="n">warning-600 / -100</div></div><div class="dot" style="background:var(--warning-100);margin-left:auto"></div></div>
  <div class="chip"><div class="dot" style="background:var(--critical-600)"></div><div><b>Critical</b><div class="n">critical-600 / -100</div></div><div class="dot" style="background:var(--critical-100);margin-left:auto"></div></div>
</div>
</body></html>
