<!-- @dsCard group="Spacing" viewport="700x190" subtitle="Warm-tinted, faint. Default is FLAT — elevation signals interactivity or overlay." name="Elevation" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
body{padding:24px;display:flex;gap:24px}
.b{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-md);width:120px;height:88px;display:flex;align-items:flex-end;padding:10px}
.n{font-family:var(--font-mono);font-size:10.5px;color:var(--text-muted)}
</style>
</head><body>
<div class="b"><span class="n">flat (default)</span></div>
<div class="b" style="box-shadow:var(--shadow-xs)"><span class="n">shadow-xs</span></div>
<div class="b" style="box-shadow:var(--shadow-sm)"><span class="n">shadow-sm</span></div>
<div class="b" style="box-shadow:var(--shadow-md)"><span class="n">shadow-md</span></div>
<div class="b" style="box-shadow:var(--shadow-lg)"><span class="n">shadow-lg</span></div>
</body></html>
