<!-- @dsCard group="Spacing" viewport="700x230" subtitle="4px grid — sections breathe at space-11/12" name="Spacing scale" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
body{padding:20px 24px}
.row{display:grid;grid-template-columns:90px 1fr;align-items:center;gap:12px;margin-bottom:7px}
.n{font-family:var(--font-mono);font-size:10.5px;color:var(--text-muted)}
.bar{height:14px;background:var(--cobalt-100);border:1px solid var(--cobalt-200);border-radius:2px}
</style>
</head><body>
<div class="row"><span class="n">space-2 · 8</span><div class="bar" style="width:8px"></div></div>
<div class="row"><span class="n">space-4 · 16</span><div class="bar" style="width:16px"></div></div>
<div class="row"><span class="n">space-5 · 24</span><div class="bar" style="width:24px"></div></div>
<div class="row"><span class="n">space-6 · 32</span><div class="bar" style="width:32px"></div></div>
<div class="row"><span class="n">space-8 · 48</span><div class="bar" style="width:48px"></div></div>
<div class="row"><span class="n">space-9 · 64</span><div class="bar" style="width:64px"></div></div>
<div class="row"><span class="n">space-11 · 96</span><div class="bar" style="width:96px"></div></div>
<div class="row"><span class="n">space-12 · 128</span><div class="bar" style="width:128px"></div></div>
</body></html>
