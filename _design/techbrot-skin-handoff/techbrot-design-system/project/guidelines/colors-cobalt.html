<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
body{padding:20px 24px}
.r{display:grid;grid-template-columns:repeat(6,1fr);gap:8px}
.s{height:64px;border-radius:var(--radius-sm);border:1px solid var(--line)}
.n{font-family:var(--font-mono);font-size:10.5px;color:var(--text-muted);margin-top:6px}
</style>
</head><body>
<div class="r">
  <div><div class="s" style="background:var(--cobalt-50)"></div><div class="n">cobalt-50</div></div>
  <div><div class="s" style="background:var(--cobalt-100)"></div><div class="n">cobalt-100</div></div>
  <div><div class="s" style="background:var(--cobalt-200)"></div><div class="n">cobalt-200</div></div>
  <div><div class="s" style="background:var(--cobalt-500)"></div><div class="n">cobalt-500</div></div>
  <div><div class="s" style="background:var(--cobalt-600)"></div><div class="n">cobalt-600 ★</div></div>
  <div><div class="s" style="background:var(--cobalt-700)"></div><div class="n">cobalt-700</div></div>
</div>
</body></html>
