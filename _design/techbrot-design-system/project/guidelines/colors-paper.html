<!-- @dsCard group="Colors" viewport="700x150" name="Paper — primary ground" subtitle="Warm paper ramp; never pure white" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 16px; background: var(--bg-page); }
  .row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .sw { border: 1px solid var(--border-hairline); border-radius: var(--radius-sm); overflow: hidden; }
  .sw__chip { height: 64px; }
  .sw__meta { padding: 8px 10px; background: var(--color-paper); }
  .sw__name { font-family: var(--font-mono); font-size: 11px; color: var(--text-primary); }
  .sw__val { font-family: var(--font-mono); font-size: 10px; color: var(--text-secondary); margin-top: 2px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="sw__chip" style="background: var(--color-paper);"></div><div class="sw__meta"><div class="sw__name">--color-paper</div><div class="sw__val">#FAFAF7 · page ground</div></div></div>
    <div class="sw"><div class="sw__chip" style="background: var(--color-paper-warm);"></div><div class="sw__meta"><div class="sw__name">--color-paper-warm</div><div class="sw__val">#F3F1EB · alt sections</div></div></div>
    <div class="sw"><div class="sw__chip" style="background: var(--color-paper-deep);"></div><div class="sw__meta"><div class="sw__name">--color-paper-deep</div><div class="sw__val">#ECEAE2 · table heads</div></div></div>
    <div class="sw"><div class="sw__chip" style="background: var(--color-paper-edge);"></div><div class="sw__meta"><div class="sw__name">--color-paper-edge</div><div class="sw__val">#DDD9CC · hairlines</div></div></div>
  </div>
</body>
</html>
