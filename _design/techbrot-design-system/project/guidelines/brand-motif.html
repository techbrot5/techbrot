<!-- @dsCard group="Brand" viewport="700x300" name="Hero motif — structured ledger geometry" subtitle="Thin accent strokes; full grade on HUB/LOCATION, single element on MOFU, none on BOFU" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 16px; background: var(--bg-page); display: grid; grid-template-columns: 1.5fr 1fr; gap: 12px; }
  .panel { border-radius: var(--radius-sm); overflow: hidden; position: relative; min-height: 250px; }
  .panel--dark { background: var(--color-surface-dark); }
  .panel--paper { background: var(--bg-section-alt); border: 1px solid var(--border-hairline); }
  .panel img { position: absolute; inset-inline-end: -10%; inset-block-start: -8%; height: 130%; width: auto; }
  .panel__label { position: absolute; left: 14px; bottom: 12px; font-family: var(--font-mono); font-size: 10px; }
  .panel--dark .panel__label { color: var(--color-ink-inverted-mute); }
  .panel--paper .panel__label { color: var(--text-secondary); }
</style>
</head>
<body>
  <div class="panel panel--dark">
    <img src="../assets/motif-ledger-full.svg" alt="">
    <span class="panel__label">full grade · HUB / LOCATION · on --color-surface-dark</span>
  </div>
  <div class="panel panel--paper">
    <img src="../assets/motif-ledger-single.svg" alt="">
    <span class="panel__label">restrained · MOFU / GUIDE · on paper</span>
  </div>
</body>
</html>
