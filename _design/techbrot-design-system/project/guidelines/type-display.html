<!-- @dsCard group="Type" viewport="700x230" name="Fraunces — display serif" subtitle="Regular weight only; tight leading and tracking at display sizes" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 20px 24px; background: var(--bg-page); }
  .spec { font-family: var(--font-serif); color: var(--text-primary); }
  .spec--display { font-size: var(--fs-44); line-height: var(--lh-tight); letter-spacing: var(--ls-tight); }
  .spec--italic { font-size: var(--fs-18); font-style: italic; color: var(--text-secondary); margin-top: 14px; }
  .meta { font-family: var(--font-mono); font-size: 10px; color: var(--text-secondary); margin-top: 14px; display: flex; gap: 18px; }
</style>
</head>
<body>
  <p class="spec spec--display">Automation handles the data entry. We handle the judgment.</p>
  <p class="spec spec--italic">Italic Fraunces is the human aside — buyer signals, honesty notes.</p>
  <div class="meta"><span>--font-serif · Fraunces opsz 9..144</span><span>weight 400 — never bold</span><span>--lh-tight 1.05 · --ls-tight −0.02em</span></div>
</body>
</html>
