<!-- @dsCard group="Spacing" viewport="700x170" name="Radii — restrained" subtitle="4px on cards/inputs/buttons · pill ONLY on location pills & eyebrow chips" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 18px 24px; background: var(--bg-page); display: flex; gap: 14px; align-items: flex-end; }
  .r { display: flex; flex-direction: column; gap: 8px; align-items: center; }
  .r__box { width: 84px; height: 64px; background: var(--bg-card); border: 1px solid var(--text-secondary); }
  .r__tok { font-family: var(--font-mono); font-size: 10px; color: var(--text-secondary); text-align: center; }
  .pill { width: 120px; height: 38px; border-radius: var(--radius-pill); display: flex; align-items: center; justify-content: center; font-size: 12px; font-family: var(--font-sans); color: var(--text-primary); background: var(--bg-card); border: 1px solid var(--border-hairline); }
  .no { color: var(--color-accent); font-weight: 600; }
</style>
</head>
<body>
  <div class="r"><div class="r__box" style="border-radius: var(--radius-none);"></div><span class="r__tok">none · 0</span></div>
  <div class="r"><div class="r__box" style="border-radius: var(--radius-xs);"></div><span class="r__tok">xs · 2px</span></div>
  <div class="r"><div class="r__box" style="border-radius: var(--radius-sm);"></div><span class="r__tok">sm · 4px ← default</span></div>
  <div class="r"><div class="r__box" style="border-radius: var(--radius-md);"></div><span class="r__tok">md · 6px</span></div>
  <div class="r"><div class="r__box" style="border-radius: var(--radius-lg);"></div><span class="r__tok">lg · 8px · max</span></div>
  <div class="r"><div class="pill">Dallas, TX</div><span class="r__tok">pill · pills + chips <span class="no">only</span></span></div>
</body>
</html>
