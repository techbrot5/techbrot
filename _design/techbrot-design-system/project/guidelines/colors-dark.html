<!-- @dsCard group="Colors" viewport="700x160" name="Dark surfaces — editorial punctuation" subtitle="Dark bands are deliberate punctuation, not default" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 16px; background: var(--bg-page); }
  .band { background: var(--color-surface-dark); border-radius: var(--radius-sm); padding: 18px 20px; display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 16px; align-items: center; }
  .t { font-family: var(--font-sans); }
  .t__sample { font-size: 14px; line-height: 1.4; }
  .t__name { font-family: var(--font-mono); font-size: 10px; margin-top: 6px; color: var(--color-ink-inverted-mute); }
  .chip { height: 44px; border: 1px solid rgba(250,250,247,0.18); border-radius: var(--radius-xs); }
</style>
</head>
<body>
  <div class="band">
    <div class="t"><div class="chip" style="background: var(--color-surface-dark-2);"></div><div class="t__name">--color-surface-dark-2 #1A1A18</div></div>
    <div class="t"><div class="t__sample" style="color: var(--color-ink-inverted);">Primary inverted ink for headings on dark.</div><div class="t__name">--color-ink-inverted</div></div>
    <div class="t"><div class="t__sample" style="color: var(--color-ink-inverted-soft);">Soft inverted ink carries body copy.</div><div class="t__name">--color-ink-inverted-soft ·78</div></div>
    <div class="t"><div class="t__sample" style="color: var(--color-ink-inverted-mute);">Muted inverted ink for disclaimers.</div><div class="t__name">--color-ink-inverted-mute ·55</div></div>
  </div>
</body>
</html>
