<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 20px 24px; background: var(--bg-page); display: flex; align-items: center; gap: 40px; }
  .lockup { display: flex; align-items: center; gap: 12px; }
  .lockup img { height: 44px; width: auto; }
  .wordmark { font-family: var(--font-serif); font-size: var(--fs-32); letter-spacing: var(--ls-tight); color: var(--text-primary); }
  .wordmark em { font-style: normal; color: var(--color-accent); }
  .dark { background: var(--color-surface-dark); padding: 18px 24px; border-radius: var(--radius-sm); }
  .dark .wordmark { color: var(--color-ink-inverted); }
  .note { font-size: 11px; color: var(--text-secondary); font-style: italic; max-width: 22ch; }
</style>
</head>
<body>
  <div class="lockup">
    <img src="../assets/logo-t-black.png" alt="TechBrot mark">
    <span class="wordmark">Tech<em>Brot</em></span>
  </div>
  <div class="dark lockup">
    <img src="../assets/logo-t-white.png" alt="">
    <span class="wordmark">Tech<em>Brot</em></span>
  </div>
  <p class="note">Official mark supplied by the founder. Black on paper surfaces, white on dark. Never recolor, tile, or box it.</p>
</body>
</html>
